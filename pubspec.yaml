name: transit_delay_predictor
description: "A cross-platform Flutter app that predicts public transport delays using Supabase and real-time weather data."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.2
  material_color_utilities: ^0.13.0

  # Supabase & Backend
  supabase_flutter: ^1.10.0
  supabase: ^1.11.0

  # Maps
  google_maps_flutter: ^2.7.0

  # State Management
  provider: ^6.0.0

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3

  # Notifications
  flutter_local_notifications: ^15.1.0

  # Date/Time handling
  intl: ^0.18.0

  # Utility
  uuid: ^4.0.0
  geolocator: ^9.0.0
  permission_handler: ^11.4.0

  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

